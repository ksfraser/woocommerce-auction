[global]
daemonize = no
log_level = warning

[www]
listen = 9000
listen.allowed_clients = 127.0.0.1

user = www-data
group = www-data

pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.process_idle_timeout = 10s

; Additional options
clear_env = no
catch_workers_output = yes

; Security
security.limit_extensions = .php
